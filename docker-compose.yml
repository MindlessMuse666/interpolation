services:
  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_started
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    networks:
      - interpolation-network

  gateway:
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./config/config.toml:/app/config.toml
    depends_on:
      interpolation-service:
        condition: service_started
      history-service:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      - GIN_MODE=release
    networks:
      - interpolation-network

  interpolation-service:
    build:
      context: ./backend
      dockerfile: interpolation/Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - ./config/config.toml:/app/config.toml
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - GIN_MODE=release
    networks:
      - interpolation-network

  history-service:
    build:
      context: ./backend
      dockerfile: history/Dockerfile
    ports:
      - "8082:8082"
    volumes:
      - ./config/config.toml:/app/config.toml
      - history-db:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - GIN_MODE=release
    networks:
      - interpolation-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - interpolation-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - ./docker/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - interpolation-network

networks:
  interpolation-network:
    driver: bridge

volumes:
  history-db:
