<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Градиент для кривой -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <!-- Лёгкая тень для узлов -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#0F172A" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Фоновая подложка для выдерживания круглой формы -->
  <circle cx="50" cy="50" r="45" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2" />

  <!-- Кривая интерполяции -->
  <path d="M 20 70.6 
           C 24.3 55.6, 28.6 40.6, 32.9 48.1 
           C 37.1 55.6, 45.7 78.1, 50.0 63.1 
           C 54.3 48.1, 62.9 21.9, 67.1 36.9 
           C 71.4 51.9, 75.7 59.4, 80.0 44.4" 
        fill="none" 
        stroke="url(#lineGrad)" 
        stroke-width="3.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Узлы интерполяции -->
  <g filter="url(#shadow)">
    <circle cx="20" cy="70.6" r="4.5" fill="#FFFFFF" stroke="#1E293B" stroke-width="2.5" />
    <circle cx="20" cy="70.6" r="1.5" fill="#1E293B" />
    
    <circle cx="32.9" cy="48.1" r="4.5" fill="#FFFFFF" stroke="#1E293B" stroke-width="2.5" />
    <circle cx="32.9" cy="48.1" r="1.5" fill="#1E293B" />
    
    <circle cx="50.0" cy="63.1" r="4.5" fill="#FFFFFF" stroke="#1E293B" stroke-width="2.5" />
    <circle cx="50.0" cy="63.1" r="1.5" fill="#1E293B" />
    
    <circle cx="67.1" cy="36.9" r="4.5" fill="#FFFFFF" stroke="#1E293B" stroke-width="2.5" />
    <circle cx="67.1" cy="36.9" r="1.5" fill="#1E293B" />
    
    <circle cx="80.0" cy="44.4" r="4.5" fill="#FFFFFF" stroke="#1E293B" stroke-width="2.5" />
    <circle cx="80.0" cy="44.4" r="1.5" fill="#1E293B" />
  </g>
</svg>